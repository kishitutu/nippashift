<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマートシフト管理</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    window.initFirebase = function(config) {
      try {
        const app = initializeApp(config);
        window.db = getFirestore(app);
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        return true;
      } catch (e) {
        console.error("Firebase初期化エラー:", e);
        return false;
      }
    };
  </script>

  <style>
    th, td { white-space: nowrap; }
    .sticky-col { position: sticky; left: 0; z-index: 10; background-color: white; }
    .sticky-header { position: sticky; top: 0; z-index: 20; background-color: white; }
    .sticky-corner { position: sticky; left: 0; top: 0; z-index: 30; background-color: white; }
    #loading { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    /* スクロールバー非表示 (タブ用) */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-2 sm:p-4">

  <div id="loading">
    <div class="spinner mb-4"></div>
    <p class="text-indigo-600 font-bold">システムを起動しています...</p>
  </div>

  <div class="max-w-[1400px] mx-auto space-y-4" id="app" style="display: none;"></div>

  <!-- 設定モーダル -->
  <div id="configModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="display: none;">
    <div class="bg-white rounded-xl shadow-xl w-[90%] max-w-lg p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex items-center gap-2 mb-4 text-indigo-700">
        <span class="material-icons-outlined">settings</span>
        <h2 class="text-xl font-bold">データベース連携設定</h2>
      </div>
      <p class="text-sm text-gray-600 mb-4">
        Firebase コンソールで取得した <code>const firebaseConfig = { ... }</code> のコードを下の枠にそのまま貼り付けてください。
      </p>
      <textarea id="configText" class="w-full h-40 p-3 border border-gray-300 rounded-lg text-xs font-mono bg-gray-50 focus:ring-2 focus:ring-indigo-500 focus:outline-none mb-4" placeholder="const firebaseConfig = {&#10;  apiKey: &quot;AIzaSy...&quot;,&#10;  authDomain: &quot;...&quot;,&#10;  ...&#10;};"></textarea>
      
      <div id="configError" class="text-red-600 text-sm font-bold mb-4 hidden">設定が正しく読み取れませんでした。</div>
      
      <div class="flex justify-end gap-3">
        <button onclick="closeConfigModal()" class="px-4 py-2 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300">キャンセル</button>
        <button onclick="saveFirebaseConfig()" class="px-4 py-2 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700">保存して連携する</button>
      </div>
    </div>
  </div>

  <script>
    // 来月の情報を自動計算する
    function getNextMonthInfo() {
      const today = new Date();
      const nextMonthDate = new Date(today.getFullYear(), today.getMonth() + 1, 1);
      const year = nextMonthDate.getFullYear();
      const month = nextMonthDate.getMonth() + 1;
      const daysInMonth = new Date(year, month, 0).getDate();
      
      const dates = [];
      const weekdays = [];
      const weekdaysStr = ['日', '月', '火', '水', '木', '金', '土'];
      for (let i = 1; i <= daysInMonth; i++) {
        dates.push(String(i));
        weekdays.push(weekdaysStr[new Date(year, month - 1, i).getDay()]);
      }
      return { year, month, dates, weekdays };
    }
    const nextMonthInfo = getNextMonthInfo();

    let state = {
      // シフト関連
      scheduleData: [], dates: [], weekdays: [], monthTitle: '勤務スケジュール',
      year: new Date().getFullYear(), month: new Date().getMonth() + 1,
      viewMode: window.innerWidth < 768 ? 'calendar' : 'table',
      selectedEmpIndex: 0, fileName: '', error: '', saveMessage: '',
      isSaving: false, isConnected: false,
      
      // 休暇申請関連
      requestData: {}, // 全員の申請データ
      currentRequestName: '', // 入力中の名前
      currentRequests: {}, // 選択中の希望休 { "日付": "種類" }
      selectedRequestType: '年休' // 選択中のペン（年休/明/早日勤）
    };

    window.onload = async () => {
      setTimeout(() => hideLoading(), 5000);
      
      const configStr = localStorage.getItem('shiftFirebaseConfig');
      if (!configStr) {
        state.isConnected = false;
        loadSampleData();
        hideLoading();
        render();
        return;
      }

      const config = JSON.parse(configStr);
      let attempts = 0;
      while (!window.initFirebase && attempts < 50) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }

      if (window.initFirebase) {
        const success = window.initFirebase(config);
        if (success) {
          state.isConnected = true;
          await loadFromCloud();
        } else {
          showError("Firebaseの接続に失敗しました。設定画面からキーを再入力してください。");
          state.isConnected = false;
          loadSampleData();
          hideLoading();
          render();
        }
      } else {
        showError("通信エラーが発生しました。ページをリロードしてください。");
        hideLoading();
      }
    };

    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    async function loadFromCloud() {
      try {
        if (!window.db) throw new Error("DB未接続");
        
        // 1. シフトデータの取得
        const docRef = window.doc(window.db, "schedules", "public_data");
        const docSnap = await window.getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          state.scheduleData = data.scheduleData || [];
          state.dates = data.dates || [];
          state.weekdays = data.weekdays || [];
          state.monthTitle = data.monthTitle || '勤務スケジュール';
          state.year = data.year || new Date().getFullYear();
          state.month = data.month || new Date().getMonth() + 1;
        } else {
          loadSampleData();
        }

        // 2. 来月の休暇申請データの取得
        const reqRef = window.doc(window.db, "leave_requests", `${nextMonthInfo.year}-${nextMonthInfo.month}`);
        const reqSnap = await window.getDoc(reqRef);
        if (reqSnap.exists()) {
          let rawRequests = reqSnap.data().requests || {};
          
          // 古い形式（配列）のデータが残っていたら、新しい形式（オブジェクト）に変換する安全対策
          for (let name in rawRequests) {
            if (Array.isArray(rawRequests[name])) {
              const newObj = {};
              rawRequests[name].forEach(d => { newObj[d] = '年休'; });
              rawRequests[name] = newObj;
            }
          }
          state.requestData = rawRequests;
        }

      } catch (e) {
        console.error("データ取得エラー:", e);
        loadSampleData();
        showError('データベースの読み込みに失敗しました。Firestoreのルール設定を確認してください。');
      } finally {
        hideLoading();
        render();
      }
    }

    window.saveToCloud = async function() {
      if (state.scheduleData.length === 0) {
        showError('保存するデータがありません。Excelを読み込んでください。');
        return;
      }
      if (!state.isConnected || !window.db) {
        openConfigModal();
        return;
      }
      
      state.isSaving = true;
      state.error = '';
      state.saveMessage = '';
      render();

      try {
        const docRef = window.doc(window.db, "schedules", "public_data");
        await window.setDoc(docRef, {
          scheduleData: state.scheduleData,
          dates: state.dates,
          weekdays: state.weekdays,
          monthTitle: state.monthTitle,
          year: state.year,
          month: state.month,
          updatedAt: new Date().toISOString()
        });
        
        state.saveMessage = 'シフト表をクラウドに共有しました！';
        state.fileName = '';
      } catch (e) {
        console.error("保存エラー:", e);
        showError('保存に失敗しました。Firebaseの「Firestore Database」のルール設定が原因の可能性があります。');
      } finally {
        state.isSaving = false;
        render();
        setTimeout(() => { state.saveMessage = ''; render(); }, 6000);
      }
    };

    // --- 休暇申請機能 ---
    
    // 名前の入力・選択が変わった時に、申請済みのデータがあればカレンダーに読み込む
    window.handleNameChange = function(name) {
      state.currentRequestName = name;
      if (state.requestData[name]) {
        state.currentRequests = JSON.parse(JSON.stringify(state.requestData[name]));
      } else {
        state.currentRequests = {};
      }
      render();
    };
    
    // 申請タイプ（ペン）の切り替え
    window.setRequestType = function(type) {
      state.selectedRequestType = type;
      render();
    };

    // カレンダーをタップしたときの処理
    window.toggleRequestDate = function(dateStr) {
      const nameInput = document.getElementById('requestNameInput');
      if (nameInput && state.currentRequestName !== nameInput.value) {
        window.handleNameChange(nameInput.value);
      }

      if (state.currentRequests[dateStr] === state.selectedRequestType) {
        delete state.currentRequests[dateStr];
      } else {
        state.currentRequests[dateStr] = state.selectedRequestType;
      }
      render();
    };

    window.submitRequest = async function() {
      const nameInput = document.getElementById('requestNameInput');
      if (nameInput) state.currentRequestName = nameInput.value;

      if (!state.currentRequestName.trim()) return showError("申請者のお名前を入力してください。");
      if (Object.keys(state.currentRequests).length === 0) return showError("希望休が1日も選択されていません。");
      if (!state.isConnected || !window.db) return openConfigModal();

      state.isSaving = true;
      state.error = '';
      state.saveMessage = '';
      render();

      try {
        const reqRef = window.doc(window.db, "leave_requests", `${nextMonthInfo.year}-${nextMonthInfo.month}`);
        
        const reqSnap = await window.getDoc(reqRef);
        let currentDBRequests = {};
        if (reqSnap.exists()) {
          currentDBRequests = reqSnap.data().requests || {};
        }
        
        const isUpdate = currentDBRequests[state.currentRequestName] !== undefined;
        currentDBRequests[state.currentRequestName] = state.currentRequests;

        await window.setDoc(reqRef, {
          requests: currentDBRequests,
          updatedAt: new Date().toISOString()
        });

        state.requestData = currentDBRequests;
        state.saveMessage = `${state.currentRequestName} さんの来月の休暇申請を${isUpdate ? '更新' : '送信'}しました！`;
      } catch (e) {
        console.error("申請エラー:", e);
        showError("休暇申請の送信に失敗しました。");
      } finally {
        state.isSaving = false;
        render();
        setTimeout(() => { state.saveMessage = ''; render(); }, 6000);
      }
    };

    window.deleteRequest = async function(name) {
      if (!confirm(`${name} さんの休暇申請を取り消しますか？`)) return;
      if (!state.isConnected || !window.db) return openConfigModal();

      state.isSaving = true;
      render();

      try {
        const reqRef = window.doc(window.db, "leave_requests", `${nextMonthInfo.year}-${nextMonthInfo.month}`);
        const reqSnap = await window.getDoc(reqRef);
        let currentDBRequests = {};
        if (reqSnap.exists()) {
          currentDBRequests = reqSnap.data().requests || {};
        }
        
        delete currentDBRequests[name];

        await window.setDoc(reqRef, {
          requests: currentDBRequests,
          updatedAt: new Date().toISOString()
        });

        state.requestData = currentDBRequests;
        state.saveMessage = `${name} さんの申請を取り消しました。`;
        
        if (state.currentRequestName === name) {
          state.currentRequests = {};
        }
      } catch(e) {
        showError("削除に失敗しました。");
      } finally {
        state.isSaving = false;
        render();
        setTimeout(() => { state.saveMessage = ''; render(); }, 4000);
      }
    };

    // --- Firebase 設定 ---
    window.openConfigModal = function() {
      document.getElementById('configModal').style.display = 'flex';
      document.getElementById('configError').classList.add('hidden');
    };
    
    window.closeConfigModal = function() {
      document.getElementById('configModal').style.display = 'none';
    };

    window.saveFirebaseConfig = function() {
      const text = document.getElementById('configText').value;
      const config = {};
      const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
      
      for (const key of keys) {
        const regex = new RegExp(`${key}\\s*:\\s*["']([^"']+)["']`);
        const match = text.match(regex);
        if (match) config[key] = match[1];
      }
      
      if (config.apiKey && config.projectId) {
        localStorage.setItem('shiftFirebaseConfig', JSON.stringify(config));
        alert("設定を保存しました。システムを再起動します。");
        location.reload();
      } else {
        document.getElementById('configError').classList.remove('hidden');
      }
    };

    function loadSampleData() {
      state.monthTitle = '2026年 4月 営業係勤務表 (未連携)';
      state.dates = Array.from({ length: 30 }, (_, i) => String(i + 1));
      state.weekdays = ['水','木','金','土','日','月','火','水','木','金','土','日','月','火','水','木','金','土','日','月','火','水','木','金','土','日','月','火','水','木'];
      state.scheduleData = [
        { id: '2430106', name: '荒明　俊介', shifts: ['法休', '泊', '明', '遅日', '泊', '明', '公休', '法休', '〇', '泊', '明', '泊', '明', '公休', '法休', '泊', '明', '遅日', '泊', '明', '公休', '法休', '変休', '遅日', '遅日', '年休', '泊', '明', '法休', '泊'] },
        { id: '2530516', name: '平林　侑馬', shifts: ['泊', '明', '公休', '法休', '〇', '泊', '明', '泊', '明', '公休', '法休', '〇', '泊', '明', '泊', '明', '公休', '法休', '泊', '明', '泊', '明', '公休', '法休', '泊', '明', '遅日', '泊', '明', '公休'] }
      ];
      state.requestData = {
        '荒明　俊介': { '5': '年休', '6': '明', '12': '早日勤' }
      };
    }

    function showError(msg) {
      state.error = msg;
      state.saveMessage = '';
      render();
    }

    function toHalfWidth(str) { return str.replace(/[０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)); }
    function triggerFileInput() { document.getElementById('fileInput').click(); }

    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      state.fileName = file.name;
      state.error = '';
      state.saveMessage = '';
      render();

      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const wb = XLSX.read(evt.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
          if (rows.length < 5) throw new Error("データが不足しています。");

          let foundTitle = '勤務スケジュール';
          let dateRowIdx = -1, dateColIdx = -1;

          for (let i = 0; i < 5; i++) {
            if (!rows[i]) continue;
            for (let j = 0; j < rows[i].length; j++) {
              const val = String(rows[i][j] || '');
              if (val.includes('年') && val.includes('月')) foundTitle = val;
            }
          }

          for (let i = 0; i < 10; i++) {
            if (!rows[i]) continue;
            for (let j = 0; j < rows[i].length; j++) {
              if (String(rows[i][j]).trim() === '1') { dateRowIdx = i; dateColIdx = j; break; }
            }
            if (dateRowIdx !== -1) break;
          }

          if (dateRowIdx === -1) throw new Error("日付行が見つかりませんでした。");

          const extDates = [];
          let col = dateColIdx;
          while (true) {
            const cellVal = String(rows[dateRowIdx][col] || '').trim();
            if (!cellVal || isNaN(parseInt(cellVal))) break;
            extDates.push(cellVal);
            col++;
          }
          const extWeekdays = [];
          for (let i = 0; i < extDates.length; i++) {
            extWeekdays.push(String(rows[dateRowIdx + 1][dateColIdx + i] || '').trim());
          }

          const idColIdx = dateColIdx - 1;
          const extEmployees = [];

          for (let i = dateRowIdx + 2; i < rows.length; i++) {
            const row1 = rows[i] || [];
            const idVal = String(row1[idColIdx] || '').trim();
            if (idVal && /\d+/.test(idVal) && i + 1 < rows.length) {
              const row2 = rows[i + 1] || [];
              const shifts = [];
              for(let d = 0; d < extDates.length; d++) {
                 shifts.push(String(row2[dateColIdx + d] || '').trim());
              }
              extEmployees.push({ id: idVal, name: String(row2[idColIdx] || '').trim() || '氏名未設定', shifts });
              i++; 
            }
          }

          if (extEmployees.length > 0) {
            state.monthTitle = foundTitle;
            state.dates = extDates;
            state.weekdays = extWeekdays;
            state.scheduleData = extEmployees;
            state.selectedEmpIndex = 0;
            state.fileName = `${file.name} を読み込みました。「共有する」を押してください。`;
            render();
          } else {
            throw new Error("フォーマットが一致しませんでした。");
          }
        } catch (err) { showError(err.message || '読み込みエラーが発生しました。'); }
        document.getElementById('fileInput').value = '';
      };
      reader.readAsBinaryString(file);
    }

    function getWeekdayHeaderStyle(wd) {
      if (wd === '土') return 'text-blue-700 bg-blue-50';
      if (wd === '日') return 'text-red-700 bg-red-50';
      return 'text-gray-600 bg-white';
    }
    function getDayColumnStyle(wd) {
      if (wd === '土') return 'bg-blue-50/20';
      if (wd === '日') return 'bg-red-50/20';
      return 'bg-white';
    }
    function getShiftColor(shiftStr) {
      if (!shiftStr) return '';
      const s = shiftStr.trim();
      if (s.includes('泊')) return 'bg-purple-100 text-purple-800 font-bold border border-purple-200';
      if (s.includes('明')) return 'bg-cyan-100 text-cyan-800 font-bold border border-cyan-200';
      if (s.includes('法休') || s.includes('公休')) return 'bg-red-100 text-red-800 font-medium border border-red-200';
      if (s.includes('年休')) return 'bg-pink-100 text-pink-800 font-medium border border-pink-200';
      if (s.includes('変休')) return 'bg-orange-100 text-orange-800 font-medium border border-orange-200';
      if (s.includes('早日勤') || s.includes('早')) return 'bg-yellow-100 text-yellow-800 font-medium border border-yellow-200';
      if (s.includes('遅日') || s.includes('遅') || s.includes('変出')) return 'bg-blue-100 text-blue-800 font-medium border border-blue-200';
      if (s === '〇') return 'bg-emerald-100 text-emerald-800 font-bold border border-emerald-200';
      return 'bg-gray-100 text-gray-800 border border-gray-200';
    }

    function changeView(mode) { state.viewMode = mode; render(); }
    function changeEmp(index) { state.selectedEmpIndex = index; render(); }
    function copyUrl() {
      navigator.clipboard.writeText(window.location.href);
      alert('URLをコピーしました。スタッフに共有してください。');
    }

    function render() {
      const appDiv = document.getElementById('app');
      const disableShareBtn = state.isSaving || state.scheduleData.length === 0 ? 'disabled' : '';
      
      let html = `
        <header class="flex flex-col lg:flex-row lg:items-center justify-between bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100 gap-4">
          <div class="flex items-center gap-3">
            <div class="p-2 sm:p-3 bg-indigo-600 text-white rounded-lg"><span class="material-icons-outlined">calendar_month</span></div>
            <div>
              <h1 class="text-xl sm:text-2xl font-bold text-gray-900">${state.monthTitle}</h1>
              <div class="flex items-center gap-2 mt-1">
                <span class="flex h-3 w-3 relative">
                  ${state.isConnected ? `<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>` : `<span class="relative inline-flex rounded-full h-3 w-3 bg-gray-400"></span>`}
                </span>
                <p class="text-xs sm:text-sm ${state.isConnected ? 'text-emerald-600 font-bold' : 'text-gray-500'}">
                  ${state.isConnected ? 'クラウド接続済み' : '設定未完了（ローカルモード）'}
                </p>
              </div>
            </div>
          </div>
          
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
            
            <div class="flex bg-gray-100 p-1 rounded-lg overflow-x-auto hide-scrollbar whitespace-nowrap">
              <button onclick="changeView('table')" class="flex-none sm:flex-1 flex justify-center items-center gap-1 px-3 py-2 rounded-md text-sm font-bold transition-all ${state.viewMode === 'table' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500'}">
                <span class="material-icons-outlined" style="font-size: 18px;">grid_on</span> 全体
              </button>
              <button onclick="changeView('calendar')" class="flex-none sm:flex-1 flex justify-center items-center gap-1 px-3 py-2 rounded-md text-sm font-bold transition-all ${state.viewMode === 'calendar' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500'}">
                <span class="material-icons-outlined" style="font-size: 18px;">event</span> 個人
              </button>
              <button onclick="changeView('request')" class="flex-none sm:flex-1 flex justify-center items-center gap-1 px-3 py-2 rounded-md text-sm font-bold transition-all ${state.viewMode === 'request' ? 'bg-white text-pink-600 shadow-sm' : 'text-gray-500'}">
                <span class="material-icons-outlined" style="font-size: 18px;">edit_calendar</span> 申請
              </button>
              <button onclick="changeView('request_list')" class="flex-none sm:flex-1 flex justify-center items-center gap-1 px-3 py-2 rounded-md text-sm font-bold transition-all ${state.viewMode === 'request_list' ? 'bg-white text-pink-600 shadow-sm' : 'text-gray-500'}">
                <span class="material-icons-outlined" style="font-size: 18px;">fact_check</span> 申請一覧
              </button>
            </div>

            <div class="flex gap-2">
              <button onclick="triggerFileInput()" class="flex-1 sm:flex-none flex items-center justify-center gap-1 px-3 py-2 rounded-lg font-bold transition-all bg-white text-indigo-600 border border-indigo-200 hover:bg-indigo-50 shadow-sm text-sm">
                <span class="material-icons-outlined" style="font-size: 18px;">upload_file</span> Excel
              </button>
              
              <button onclick="saveToCloud()" ${disableShareBtn} class="flex-1 sm:flex-none flex items-center justify-center gap-1 px-3 py-2 rounded-lg font-bold transition-all ${disableShareBtn ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm'} text-sm">
                <span class="material-icons-outlined" style="font-size: 18px;">${state.isSaving ? 'sync' : 'share'}</span> ${state.isSaving ? '保存中...' : '共有する'}
              </button>
              
              <button onclick="openConfigModal()" class="flex-none flex items-center justify-center p-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 shadow-sm" title="データベース設定">
                <span class="material-icons-outlined">settings</span>
              </button>
            </div>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
          </div>
        </header>
      `;

      if (state.error) {
        html += `<div class="p-4 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3 text-red-700"><span class="material-icons-outlined">error_outline</span><div><p class="font-bold">エラー</p><p class="text-sm">${state.error}</p></div></div>`;
      }
      if (state.saveMessage) {
        html += `<div class="p-4 bg-emerald-50 border border-emerald-200 rounded-xl flex items-start gap-3 text-emerald-800 shadow-sm"><span class="material-icons-outlined text-emerald-600">cloud_done</span><div class="flex-1"><p class="font-bold mb-1">${state.saveMessage}</p></div></div>`;
      } else if (state.fileName && !state.error) {
        html += `<div class="p-3 bg-blue-50 border border-blue-200 rounded-lg flex items-center gap-2 text-blue-800 text-sm shadow-sm"><span class="material-icons-outlined text-blue-600">info</span>${state.fileName}</div>`;
      }

      if (state.viewMode === 'table') html += renderTableView();
      else if (state.viewMode === 'calendar') html += renderCalendarView();
      else if (state.viewMode === 'request') html += renderRequestView();
      else if (state.viewMode === 'request_list') html += renderRequestListView();

      appDiv.innerHTML = html;
    }

    function renderTableView() {
      if (state.scheduleData.length === 0) return `<div class="bg-white rounded-xl border border-gray-100 flex flex-col items-center justify-center h-64 text-gray-400"><p>Excelファイル（またはCSV）をアップロードしてください。</p></div>`;

      let thDates = '';
      state.dates.forEach((d, i) => { thDates += `<th class="py-2 px-1 border-b-2 border-r border-gray-200 sticky-header min-w-[48px] text-center ${getWeekdayHeaderStyle(state.weekdays[i])}"><div class="text-sm font-bold">${d}</div><div class="text-[10px] opacity-80">${state.weekdays[i]}</div></th>`; });

      let trRows = '';
      state.scheduleData.forEach(emp => {
        let tdShifts = '';
        emp.shifts.forEach((shift, i) => {
          let shiftHtml = shift ? `<div class="inline-flex items-center justify-center w-full min-h-[36px] rounded shadow-sm text-xs px-1 ${getShiftColor(shift)}">${shift}</div>` : '';
          tdShifts += `<td class="p-1.5 text-center border-r border-gray-100 ${getDayColumnStyle(state.weekdays[i])}">${shiftHtml}</td>`;
        });
        trRows += `<tr class="hover:bg-gray-50 border-b border-gray-100"><td class="p-2 border-r-2 border-gray-200 sticky-col shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)] w-[140px] max-w-[140px] overflow-hidden"><div class="text-[10px] text-gray-400 font-mono truncate">${emp.id}</div><div class="text-sm font-bold text-gray-800 truncate">${emp.name}</div></td>${tdShifts}</tr>`;
      });

      return `<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[600px]"><div class="p-3 border-b border-gray-100 bg-gray-50 flex justify-between items-center"><span class="text-xs text-gray-500">※表は横にスクロールできます</span><span class="text-xs bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-bold">${state.scheduleData.length} 名</span></div><div class="overflow-auto flex-grow relative pb-4"><table class="w-full min-w-max border-collapse text-left"><thead><tr><th class="p-2 border-b-2 border-r-2 border-gray-200 sticky-corner shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] w-[140px]"><div class="text-xs text-gray-500">社員番号</div><div class="text-sm font-bold text-gray-800">氏名</div></th>${thDates}</tr></thead><tbody>${trRows}</tbody></table></div></div>`;
    }

    function renderCalendarView() {
      if (state.scheduleData.length === 0) return `<div class="bg-white rounded-xl border border-gray-100 flex flex-col items-center justify-center h-64 text-gray-400"><p>Excelファイル（またはCSV）をアップロードしてください。</p></div>`;

      let options = '';
      state.scheduleData.forEach((emp, idx) => { options += `<option value="${idx}" ${idx === state.selectedEmpIndex ? 'selected' : ''}>${emp.name} (No.${emp.id})</option>`; });

      const emp = state.scheduleData[state.selectedEmpIndex];
      
      // 【修正ポイント】Excelの1日目の曜日をベースにカレンダーの空白（パディング）を計算する
      const weekdayMap = { '日': 0, '月': 1, '火': 2, '水': 3, '木': 4, '金': 5, '土': 6 };
      let firstDay = 0;
      if (state.weekdays.length > 0 && weekdayMap[state.weekdays[0]] !== undefined) {
        firstDay = weekdayMap[state.weekdays[0]];
      } else {
        // Excelに曜日がない場合は今まで通りシステム計算
        firstDay = new Date(state.year, state.month - 1, 1).getDay();
      }

      const cells = Array(firstDay).fill(null);
      state.dates.forEach((dateStr, i) => { cells.push({ dateStr, shift: emp.shifts[i], wd: state.weekdays[i] }); });

      let calendarHtml = '';
      ['日', '月', '火', '水', '木', '金', '土'].forEach((day, idx) => {
        let style = idx === 0 ? 'bg-red-50 text-red-600' : idx === 6 ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-600';
        calendarHtml += `<div class="text-center text-xs sm:text-sm font-bold p-2 rounded-t-lg ${style}">${day}</div>`;
      });

      cells.forEach(cell => {
        if (!cell) { calendarHtml += `<div class="p-2 border border-transparent rounded-lg bg-gray-50/50"></div>`; return; }
        let style = cell.wd === '日' ? 'border-red-100 bg-red-50/10' : cell.wd === '土' ? 'border-blue-100 bg-blue-50/10' : 'border-gray-100';
        let textStyle = cell.wd === '日' ? 'text-red-500' : cell.wd === '土' ? 'text-blue-500' : 'text-gray-700';
        let shiftHtml = cell.shift ? `<div class="mt-auto text-center py-2 rounded-md text-xs sm:text-sm font-bold shadow-sm ${getShiftColor(cell.shift)}">${cell.shift}</div>` : '';
        calendarHtml += `<div class="bg-white border rounded-lg p-1.5 sm:p-2 flex flex-col min-h-[90px] sm:min-h-[110px] shadow-sm ${style}"><div class="text-right text-sm sm:text-base font-bold mb-1 ${textStyle}">${cell.dateStr}</div>${shiftHtml}</div>`;
      });

      return `<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 sm:p-6"><div class="mb-6 bg-indigo-50 p-4 rounded-xl border border-indigo-100"><label class="flex items-center gap-2 text-sm font-bold text-indigo-900 mb-2">表示するスタッフ</label><select onchange="changeEmp(Number(this.value))" class="w-full p-3 bg-white border border-indigo-200 rounded-lg text-gray-800 font-bold shadow-sm focus:ring-2 focus:ring-indigo-500 appearance-none text-lg">${options}</select></div><div class="grid grid-cols-7 gap-1 sm:gap-2">${calendarHtml}</div></div>`;
    }

    function renderRequestView() {
      let calendarHtml = '';
      
      const firstDay = new Date(nextMonthInfo.year, nextMonthInfo.month - 1, 1).getDay();
      for (let i = 0; i < firstDay; i++) {
        calendarHtml += `<div class="p-2 border border-transparent rounded-lg bg-gray-50/50"></div>`;
      }

      nextMonthInfo.dates.forEach((dateStr, i) => {
        let wd = nextMonthInfo.weekdays[i];
        let reqType = state.currentRequests[dateStr];
        
        let style = wd === '日' ? 'border-red-100 bg-red-50/10' : wd === '土' ? 'border-blue-100 bg-blue-50/10' : 'border-gray-100 bg-white';
        let textStyle = wd === '日' ? 'text-red-500' : wd === '土' ? 'text-blue-500' : 'text-gray-700';
        
        let selectedStyle = style;
        let badgeHtml = `<div class="mt-auto py-1 sm:py-2.5"></div>`;

        if (reqType === '年休') {
          selectedStyle = 'bg-pink-50 border-pink-400 shadow-inner ring-2 ring-pink-400';
          badgeHtml = `<div class="mt-auto text-center py-1.5 sm:py-2.5 rounded-md text-[10px] sm:text-sm font-bold shadow-sm leading-none flex items-center justify-center bg-pink-500 text-white">年休</div>`;
        } else if (reqType === '明') {
          selectedStyle = 'bg-cyan-50 border-cyan-400 shadow-inner ring-2 ring-cyan-400';
          badgeHtml = `<div class="mt-auto text-center py-1.5 sm:py-2.5 rounded-md text-[10px] sm:text-sm font-bold shadow-sm leading-none flex items-center justify-center bg-cyan-500 text-white">明</div>`;
        } else if (reqType === '早日勤') {
          selectedStyle = 'bg-yellow-50 border-yellow-400 shadow-inner ring-2 ring-yellow-400';
          badgeHtml = `<div class="mt-auto text-center py-1.5 sm:py-2.5 rounded-md text-[10px] sm:text-sm font-bold shadow-sm leading-none flex items-center justify-center bg-yellow-500 text-white">早日勤</div>`;
        }

        calendarHtml += `
          <div onclick="toggleRequestDate('${dateStr}')" class="cursor-pointer border rounded-lg p-1 sm:p-2 flex flex-col min-h-[70px] sm:min-h-[110px] shadow-sm transition-all hover:shadow-md ${selectedStyle}">
            <div class="text-right text-sm sm:text-base font-bold mb-1 ${textStyle}">${dateStr} <span class="text-[10px] sm:text-xs opacity-80 sm:hidden block leading-none">${wd}</span></div>
            ${badgeHtml}
          </div>
        `;
      });

      let datalistHtml = `<datalist id="empNames">`;
      state.scheduleData.forEach(emp => { datalistHtml += `<option value="${emp.name}">`; });
      datalistHtml += `</datalist>`;

      const hasExistingRequest = state.requestData[state.currentRequestName] !== undefined;
      const btnText = state.isSaving ? '送信中...' : (hasExistingRequest ? '申請内容を更新する' : 'この内容で申請する');

      return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 sm:p-6 animate-in fade-in zoom-in-95 duration-300">
          <div class="mb-6 bg-pink-50 p-4 rounded-xl border border-pink-100 flex flex-col sm:flex-row gap-4 items-end">
            <div class="flex-1 w-full">
              <label class="flex items-center gap-2 text-sm font-bold text-pink-900 mb-2">
                <span class="material-icons-outlined" style="font-size:18px;">person</span>申請する方のお名前
              </label>
              <input type="text" id="requestNameInput" list="empNames" value="${state.currentRequestName}" onchange="handleNameChange(this.value)" class="w-full p-3 bg-white border border-pink-200 rounded-lg text-gray-800 font-bold shadow-sm focus:ring-2 focus:ring-pink-500 focus:outline-none text-lg" placeholder="名前を入力してください">
              ${datalistHtml}
            </div>
            <button onclick="submitRequest()" ${state.isSaving ? 'disabled' : ''} class="w-full sm:w-auto px-6 py-3 bg-pink-600 text-white font-bold rounded-lg shadow-sm hover:bg-pink-700 transition-colors flex items-center justify-center gap-2">
              <span class="material-icons-outlined">${state.isSaving ? 'sync' : 'send'}</span>
              ${btnText}
            </button>
          </div>
          
          <div class="mb-4">
            <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2 mb-2">
              <span class="material-icons-outlined text-pink-500">edit_calendar</span>
              来月（${nextMonthInfo.year}年 ${nextMonthInfo.month}月）の希望休を選択
            </h3>
            
            <div class="flex flex-wrap gap-2 mb-3 bg-gray-50 p-2 rounded-lg border border-gray-200">
              <button onclick="setRequestType('年休')" class="flex-1 sm:flex-none px-4 py-2 rounded-md font-bold border transition-all shadow-sm ${state.selectedRequestType === '年休' ? 'bg-pink-500 text-white border-pink-600 ring-2 ring-pink-300' : 'bg-white text-pink-600 border-pink-200 hover:bg-pink-50'}">年休</button>
              <button onclick="setRequestType('明')" class="flex-1 sm:flex-none px-4 py-2 rounded-md font-bold border transition-all shadow-sm ${state.selectedRequestType === '明' ? 'bg-cyan-500 text-white border-cyan-600 ring-2 ring-cyan-300' : 'bg-white text-cyan-600 border-cyan-200 hover:bg-cyan-50'}">明 <span class="text-xs font-normal hidden sm:inline">(明け勤務)</span></button>
              <button onclick="setRequestType('早日勤')" class="flex-1 sm:flex-none px-4 py-2 rounded-md font-bold border transition-all shadow-sm ${state.selectedRequestType === '早日勤' ? 'bg-yellow-500 text-white border-yellow-600 ring-2 ring-yellow-300' : 'bg-white text-yellow-600 border-yellow-200 hover:bg-yellow-50'}">早日勤</button>
            </div>
            
            <p class="text-xs text-gray-500">ボタンで種類を選んでから、カレンダーの日付をタップして色を塗ってください。</p>
          </div>

          <div class="grid grid-cols-7 gap-1 sm:gap-2">
            ${['日', '月', '火', '水', '木', '金', '土'].map((day, idx) => `
              <div class="text-center text-xs sm:text-sm font-bold p-2 rounded-t-lg ${idx === 0 ? 'bg-red-50 text-red-600' : idx === 6 ? 'bg-blue-50 text-blue-600' : 'bg-gray-100 text-gray-600'}">${day}</div>
            `).join('')}
            
            ${calendarHtml}
          </div>
        </div>
      `;
    }

    function renderRequestListView() {
      const reqKeys = Object.keys(state.requestData);

      if (reqKeys.length === 0) {
        return `<div class="bg-white rounded-xl border border-gray-100 flex flex-col items-center justify-center h-64 text-gray-400"><span class="material-icons-outlined text-4xl mb-2">inbox</span><p>まだ来月（${nextMonthInfo.year}年${nextMonthInfo.month}月）の休暇申請は届いていません。</p></div>`;
      }

      let trRows = '';
      reqKeys.forEach(name => {
        let daysObj = state.requestData[name];
        
        let sortedDates = Object.keys(daysObj).sort((a,b) => Number(a) - Number(b));
        
        let badges = sortedDates.map(d => {
          let type = daysObj[d];
          let badgeClass = '';
          if(type === '年休') badgeClass = 'bg-pink-100 text-pink-800 border-pink-200';
          else if(type === '明') badgeClass = 'bg-cyan-100 text-cyan-800 border-cyan-200';
          else if(type === '早日勤') badgeClass = 'bg-yellow-100 text-yellow-800 border-yellow-200';
          
          return `<span class="inline-block ${badgeClass} text-xs px-2 py-1 rounded border mr-1 mb-1 font-bold">${d}日(${type})</span>`;
        }).join('');
        
        trRows += `
          <tr class="hover:bg-gray-50 border-b border-gray-100">
            <td class="p-3 border-r border-gray-200 font-bold text-gray-800 whitespace-nowrap">${name}</td>
            <td class="p-3 text-sm">${badges}</td>
            <td class="p-3 text-center w-24">
              <button onclick="deleteRequest('${name}')" class="text-red-500 hover:text-red-700 text-xs font-bold flex items-center justify-center gap-1 mx-auto bg-red-50 px-2 py-1 rounded border border-red-100">
                <span class="material-icons-outlined text-[14px]">delete</span> 取消
              </button>
            </td>
          </tr>
        `;
      });

      return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
          <div class="p-4 border-b border-gray-100 bg-pink-50 flex justify-between items-center">
            <h3 class="text-lg font-bold text-pink-900 flex items-center gap-2">
              <span class="material-icons-outlined">fact_check</span>
              来月（${nextMonthInfo.year}年 ${nextMonthInfo.month}月）の申請一覧
            </h3>
            <span class="text-xs bg-pink-200 text-pink-900 px-3 py-1 rounded-full font-bold">計 ${reqKeys.length} 名</span>
          </div>
          <div class="overflow-auto relative">
            <table class="w-full text-left border-collapse min-w-[500px]">
              <thead>
                <tr class="bg-white border-b-2 border-gray-200">
                  <th class="p-3 text-sm text-gray-600 w-1/4">申請者名</th>
                  <th class="p-3 text-sm text-gray-600">希望内容</th>
                  <th class="p-3 text-sm text-gray-600 text-center">操作</th>
                </tr>
              </thead>
              <tbody>
                ${trRows}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
